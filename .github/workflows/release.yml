name: Build and Release tlsanalyzer

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3
          cache: false

      - name: Build binary
        run: |
          output_name=tlsanalyzer-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output_name=${output_name}.exe
          fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-X 'github.com/olelbis/tlsanalyzer/build.Version=$(cat VERSION)' -X 'github.com/olelbis/tlsanalyzer/build.BuildUser=Team tlsanalyzer' -X 'github.com/olelbis/tlsanalyzer/build.BuildTime=$(date)' -s -w" -o $output_name .

      - name: Install nFPM
        if: matrix.goos == 'linux'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3

      - name: Build Linux packages
        if: matrix.goos == 'linux'
        run: |
          mkdir -p packaging/root/usr/bin packages
          cp tlsanalyzer-linux-${{ matrix.goarch }} packaging/root/usr/bin/tlsanalyzer
          export PACKAGE_VERSION="${GITHUB_REF_NAME#v}"
          export PACKAGE_ARCH="${{ matrix.goarch }}"
          "$(go env GOPATH)/bin/nfpm" pkg --config packaging/nfpm.yaml --packager deb --target packages/
          "$(go env GOPATH)/bin/nfpm" pkg --config packaging/nfpm.yaml --packager rpm --target packages/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            tlsanalyzer-${{ matrix.goos }}-${{ matrix.goarch }}*
            packages/*

  release:
    needs: build_and_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Flatten release artifacts
        run: |
          mkdir -p dist
          find ./artifacts -type f -exec cp {} dist/ \;

      - name: Generate SBOM
        run: scripts/generate-sbom.sh "${GITHUB_REF_NAME}" > "dist/tlsanalyzer-${GITHUB_REF_NAME}-sbom.spdx.json"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: dist/*

      - name: Extract release notes from changelog
        run: |
          awk -v version="${GITHUB_REF_NAME}" '
            $0 ~ "^## " version "([[:space:]]|-|$)" { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog notes found for ${GITHUB_REF_NAME}." > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release and Upload All Binaries
        uses: ncipollo/release-action@v1
        with:
           artifacts: ./dist/*
           tag: ${{ github.ref_name }}
           name: tlsanalyzer release ${{ github.ref_name }}
           prerelease: false
           bodyFile: RELEASE_NOTES.md
           skipIfReleaseExists: true

  container_image:
    needs: release
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Capture build time
        id: build_time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and publish container image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
